services:
  jupyter:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
    environment:
      - JUPYTER_ENABLE_LAB=yes
    user: "${USER_ID}:${GROUP_ID}"  # setting user and group
    build:
      context: .
      args:
        USER_ID: ${USER_ID}  # passing UID
        GROUP_ID: ${GROUP_ID}  # passing GID
